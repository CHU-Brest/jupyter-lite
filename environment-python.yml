# Environnement du kernel Python (xeus-python) compilé en WebAssembly.
# Tous ces paquets sont téléchargés depuis emscripten-forge AU MOMENT DU BUILD
# et empaquetés dans dist/. Aucun accès réseau n'est nécessaire à l'exécution.
name: python
channels:
  - https://repo.prefix.dev/emscripten-forge-dev
  - https://repo.prefix.dev/conda-forge
dependencies:
  - xeus-python
  - python
  # --- Data / analytics ---
  # NB: le paquet s'appelle "python-duckdb" sur emscripten-forge
  # (il fournit le module Python "duckdb").
  - python-duckdb
  - pandas
  - numpy
  # --- Visualisation / widgets ---
  - matplotlib
  - ipywidgets
  # NB: polars n'est PAS disponible en WebAssembly (le projet Polars ne
  # supporte pas Emscripten, polars-runtime-32 n'existe pas sur
  # emscripten-forge). DuckDB + pandas servent d'alternative cote navigateur.
