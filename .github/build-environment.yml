# Environnement utilisé UNIQUEMENT par le runner GitHub Actions pour le build.
#
# Site Python seul, propulsé par le kernel Pyodide.
# IMPORTANT : on épingle Pyodide 0.27 (via pyodide-kernel 0.6.x) car c'est la
# seule série Pyodide qui embarque duckdb ET polars (retirés en Pyodide 0.28+).
#   jupyterlite-pyodide-kernel 0.6.x  <->  jupyterlite-core 0.6.x  <->  Pyodide 0.27.6
name: build-env
channels:
  - conda-forge
dependencies:
  - python
  - pip
  - jupyter_server
  - jupyterlite-core >=0.6,<0.7
  - jupyterlite-pyodide-kernel ==0.6.1
